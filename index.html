<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farrah Shah | Systems Engineering</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --surface: #0d0d0d;
            --maroon: #600000;
            --maroon-light: #900000;
            --text-main: #ffffff;
            --text-dim: #999999;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; text-transform: lowercase; }

        /* Smooth Background Glow */
        .glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(96, 0, 0, 0.15) 0%, transparent 50%);
            z-index: -1;
        }

        #about-card {
            max-width: 1000px;
            width: 90%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 60px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 50px;
            align-items: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            animation: slideIn 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .text-content h1 {
            font-size: clamp(3rem, 8vw, 5.5rem);
            line-height: 0.85;
            margin-bottom: 30px;
            letter-spacing: -3px;
            color: var(--maroon-light);
        }

        .text-content p {
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text-dim);
            margin-bottom: 40px;
        }

        /* Avatar Styling - THE FIX IS HERE */
        .avatar-container {
            width: 350px;
            height: 350px;
            border-radius: 30px;
            overflow: hidden;
            background: #151515;
            border: 1px solid var(--maroon);
            position: relative;
            transform: rotate(3deg);
            transition: 0.5s ease;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .avatar-container:hover { transform: rotate(0deg) scale(1.02); }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block; /* Ensures no hidden gaps */
            filter: grayscale(20%) contrast(110%);
        }

        .cta {
            display: inline-block;
            padding: 18px 40px;
            background: var(--maroon);
            color: white;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .cta:hover { background: var(--maroon-light); transform: translateY(-3px); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            #about-card { grid-template-columns: 1fr; text-align: center; padding: 40px; }
            .avatar-container { margin: 0 auto; width: 250px; height: 250px; }
            .text-content h1 { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <section id="about-card">
        <div class="text-content">
            <h1>farrah<br>shah</h1>
            <p>I specialize in engineering WordPress ecosystems: from bespoke theme/plugin development to WooCommerce and multisite builds. Using ACF, CPTs, and the REST API, I turn CMS sites into data-driven engines. I also build Headless WordPress apps with React and Node.js.</p>
            <a href="mailto:farrahshaeh@gmail.com" class="cta">LET'S BUILD</a>
        </div>

        <div class="avatar-container">
            <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&q=80&w=600" alt="Farrah Shah Portrait">
        </div>
    </section>

</body>
</html>

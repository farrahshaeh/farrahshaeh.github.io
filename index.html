<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farrah Shah | Systems Engineering</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --surface: #0d0d0d;
            --maroon: #600000;
            --maroon-glow: #900000;
            --text-main: #ffffff;
            --text-dim: #999999;
            --border: rgba(255, 255, 255, 0.05);
            --ease: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; text-transform: lowercase; letter-spacing: -3px;}

        /* Background Glow */
        .glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 15% 15%, rgba(96, 0, 0, 0.1) 0%, transparent 50%);
            z-index: -1;
        }

        #about-card {
            max-width: 1100px;
            width: 90%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 80px 60px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 60px;
            align-items: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            animation: slideUp 1.2s var(--ease);
            position: relative;
        }

        .text-content h1 {
            font-size: clamp(3.5rem, 8vw, 6rem);
            line-height: 0.85;
            margin-bottom: 25px;
            color: var(--maroon-glow);
        }

        .text-content p {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-dim);
            margin-bottom: 40px;
            max-width: 600px;
        }

        /* Avatar Box */
        .avatar-box {
            width: 350px;
            height: 450px;
            background: #151515;
            border-radius: 24px;
            border: 1px solid var(--maroon);
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: 0.5s var(--ease);
        }

        .avatar-box:hover { transform: scale(1.02); border-color: var(--maroon-glow); }

        .avatar-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(110%);
        }

        .cta {
            display: inline-block;
            padding: 20px 45px;
            background: var(--maroon);
            color: white;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .cta:hover { background: var(--maroon-glow); box-shadow: 0 0 30px var(--maroon); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(60px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 950px) {
            #about-card { grid-template-columns: 1fr; text-align: center; padding: 60px 30px; }
            .avatar-box { margin: 0 auto; width: 280px; height: 350px; }
            .text-content h1 { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <section id="about-card">
        <div class="text-content">
            <h1>farrah<br>shah</h1>
            <p>I specialize in engineering WordPress ecosystems: from bespoke theme/plugin development to WooCommerce and multisite builds. Using ACF, CPTs, and the REST API, I turn CMS sites into data-driven engines. I also build Headless WordPress apps with React and Node.js.</p>
            <a href="mailto:farrahshaeh@gmail.com" class="cta">Connect Ecosystem</a>
        </div>

        <div class="avatar-box">
            <img src="https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=1074&auto=format&fit=crop" alt="Farrah Shah AI Avatar">
        </div>
    </section>

</body>
</html>
